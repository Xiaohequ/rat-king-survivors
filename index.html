<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat King Survivors</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            border: 3px solid #a855f7;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
        }
        canvas {
            display: block;
            background-color: #1a1a2e;
        }
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .ui-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid #a855f7;
            border-radius: 4px;
            padding: 8px 12px;
            color: white;
            font-size: 14px;
        }
        #hpBar { top: 10px; left: 10px; width: 220px; }
        #hpFill {
            height: 20px;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            border-radius: 3px;
            transition: width 0.3s;
        }
        #hpText { margin-bottom: 5px; font-weight: bold; }
        #stats { top: 10px; right: 10px; text-align: right; }
        #waveInfo { top: 50px; left: 10px; }
        #ratInfo { top: 90px; left: 10px; }
        #upgradeMenu {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            pointer-events: all;
        }
        .upgrade-cards { display: flex; gap: 20px; margin-top: 30px; }
        .upgrade-card {
            width: 200px;
            padding: 20px;
            background: #2a2a4e;
            border: 3px solid #a855f7;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .upgrade-card:hover {
            transform: translateY(-5px);
            border-color: #fbbf24;
        }
        .upgrade-icon { font-size: 48px; margin-bottom: 15px; }
        .upgrade-name { font-size: 18px; font-weight: bold; color: white; margin-bottom: 10px; }
        .upgrade-desc { font-size: 13px; color: #aaaaaa; }
        #gameOverScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            pointer-events: all;
        }
        #startScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            pointer-events: all;
        }
        h1 { color: #a855f7; font-size: 48px; margin-bottom: 20px; }
        h2 { color: #fbbf24; margin-bottom: 30px; }
        .btn {
            padding: 15px 40px;
            font-size: 18px;
            background: #a855f7;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background: #7c3aed; }
        .instructions { color: #aaaaaa; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="startScreen">
            <h1>🐀 Rat King Survivors</h1>
            <h2 style="color: #a855f7;">Survive with your Rat Swarm</h2>
            <button class="btn" onclick="startGame()">Start Game</button>
            <p class="instructions">WASD/Arrows to move | Survive as long as you can!</p>
        </div>
        
        <div id="uiOverlay">
            <div id="hpBar" class="ui-panel">
                <div id="hpText">HP: 100/100</div>
                <div style="width: 200px; height: 20px; background: #333; border-radius: 3px;">
                    <div id="hpFill" style="width: 100%;"></div>
                </div>
            </div>
            <div id="stats" class="ui-panel">
                <div>Time: <span id="timeDisplay">0:00</span></div>
                <div>Kills: <span id="killDisplay">0</span></div>
                <div>Wave: <span id="waveDisplay">0</span></div>
            </div>
            <div id="waveInfo" class="ui-panel">Rats: <span id="ratDisplay">20</span></div>
            <div id="ratInfo" class="ui-panel">Damage: <span id="damageDisplay">10</span></div>
        </div>
        
        <div id="upgradeMenu">
            <h2 style="color: #fbbf24; font-size: 32px;">Choose an Upgrade!</h2>
            <p style="color: white; margin-bottom: 20px;">Press 1, 2, or 3</p>
            <div class="upgrade-cards" id="upgradeCards"></div>
        </div>
        
        <div id="gameOverScreen">
            <h1 style="color: #ef4444;">GAME OVER</h1>
            <div id="finalStats" style="color: white; font-size: 20px; text-align: center; margin: 20px 0;"></div>
            <button class="btn" onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        // --- GAME CONFIGURATION ---
        const CONFIG = {
            WIDTH: 800,
            HEIGHT: 600,
            PLAYER_SPEED: 3,
            PLAYER_RADIUS: 15,
            PLAYER_AURA: 80,
            RAT_COUNT_INIT: 20,
            RAT_SPEED: 2.5,
            RAT_RADIUS: 5,
            RAT_ATTACK_RATE: 500,
            RAT_DAMAGE: 10,
            ENEMY_SPAWN_INTERVAL: 2000,
            WAVE_DURATION: 15000,
            MAX_RATS: 300
        };

        // --- GAME STATE ---
        let canvas, ctx;
        let gameState = 'menu'; // menu, playing, upgrade, gameover
        let survivalTime = 0;
        let killCount = 0;
        let waveNumber = 0;
        let waveTimer = 0;
        let enemySpawnTimer = 0;
        let lastTime = 0;
        let keys = new Set();

        // Player
        let player = {
            x: CONFIG.WIDTH / 2,
            y: CONFIG.HEIGHT / 2,
            radius: CONFIG.PLAYER_RADIUS,
            hp: 100,
            maxHp: 100,
            speed: CONFIG.PLAYER_SPEED,
            auraRadius: CONFIG.PLAYER_AURA
        };

        // Rats
        let rats = [];
        let ratCount = CONFIG.RAT_COUNT_INIT;
        let ratDamage = CONFIG.RAT_DAMAGE;
        let ratSpeed = CONFIG.RAT_SPEED;
        let ratAttackRate = CONFIG.RAT_ATTACK_RATE;

        // Enemies
        let enemies = [];
        let enemySpawnInterval = CONFIG.ENEMY_SPAWN_INTERVAL;

        // Particles
        let particles = [];

        // --- INITIALIZATION ---
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = CONFIG.WIDTH;
            canvas.height = CONFIG.HEIGHT;

            document.addEventListener('keydown', (e) => {
                keys.add(e.key.toLowerCase());
                if (gameState === 'upgrade') {
                    if (e.key === '1') applyUpgrade(0);
                    if (e.key === '2') applyUpgrade(1);
                    if (e.key === '3') applyUpgrade(2);
                }
                if (e.key.toLowerCase() === 'r' && gameState === 'gameover') restartGame();
            });

            document.addEventListener('keyup', (e) => {
                keys.delete(e.key.toLowerCase());
            });

            requestAnimationFrame(gameLoop);
        }

        // --- GAME LOOP ---
        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime || 0;
            lastTime = timestamp;

            if (gameState === 'playing') {
                update(deltaTime);
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }

        // --- UPDATE ---
        function update(dt) {
            const dt = dt / 16.67; // Normalize to 60fps
            
            survivalTime += dt;
            waveTimer += dt;
            
            // Wave system
            if (waveTimer >= CONFIG.WAVE_DURATION) {
                waveNumber++;
                waveTimer = 0;
                enemySpawnInterval = Math.max(300, CONFIG.ENEMY_SPAWN_INTERVAL - waveNumber * 50);
            }
            
            // Spawn enemies
            enemySpawnTimer += dt;
            if (enemySpawnTimer >= enemySpawnInterval) {
                spawnEnemy();
                enemySpawnTimer = 0;
            }
            
            // Player movement
            let mx = 0, my = 0;
            if (keys.has('w') || keys.has('arrowup')) my = -1;
            if (keys.has('s') || keys.has('arrowdown')) my = 1;
            if (keys.has('a') || keys.has('arrowleft')) mx = -1;
            if (keys.has('d') || keys.has('arrowright')) mx = 1;
            
            if (mx !== 0 || my !== 0) {
                const len = Math.sqrt(mx*mx + my*my);
                player.x += (mx/len) * player.speed * dt;
                player.y += (my/len) * player.speed * dt;
            }
            
            // Keep in bounds
            player.x = Math.max(player.radius, Math.min(CONFIG.WIDTH - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(CONFIG.HEIGHT - player.radius, player.y));
            
            // Update rats
            updateRats(dt);
            
            // Update enemies
            updateEnemies(dt);
            
            // Update particles
            updateParticles(dt);
            
            // Upgrade check (every 15 seconds)
            if (Math.floor(survivalTime / CONFIG.WAVE_DURATION) > Math.floor((survivalTime - dt) / CONFIG.WAVE_DURATION)) {
                showUpgradeMenu();
            }
            
            // Update UI
            updateUI();
        }

        // --- SWARM AI ---
        function updateRats(dt) {
            const aliveRats = rats.filter(r => r.alive);
            
            for (let i = 0; i < aliveRats.length; i++) {
                const rat = aliveRats[i];
                
                // Find nearest enemy
                let nearest = null;
                let nearDist = 150; // Attack range
                
                for (const enemy of enemies) {
                    if (!enemy.alive) continue;
                    const d = distance(rat, enemy);
                    if (d < nearDist) {
                        nearDist = d;
                        nearest = enemy;
                    }
                }
                
                // Target position
                let tx = player.x;
                let ty = player.y;
                
                if (nearest && nearest.alive) {
                    // Attack enemy
                    tx = nearest.x;
                    ty = nearest.y;
                    
                    rat.attackCooldown -= dt;
                    if (rat.attackCooldown <= 0 && nearDist < rat.radius + nearest.radius + 5) {
                        nearest.hp -= ratDamage;
                        rat.attackCooldown = ratAttackRate;
                        
                        // Attack particle
                        spawnParticle(nearest.x, nearest.y, '#ff4444');
                        
                        if (nearest.hp <= 0) {
                            nearest.alive = false;
                            killCount++;
                            // Death particles
                            for (let j = 0; j < 5; j++) {
                                spawnParticle(nearest.x, nearest.y, '#ff8800');
                            }
                        }
                    }
                } else {
                    // Orbit around player with noise
                    const angle = rat.orbitAngle + survivalTime * 0.001 * rat.orbitDir;
                    const noiseX = Math.sin(survivalTime * 0.002 + rat.id) * 15;
                    const noiseY = Math.cos(survivalTime * 0.002 + rat.id) * 15;
                    
                    tx = player.x + Math.cos(angle) * player.auraRadius * 0.7 + noiseX;
                    ty = player.y + Math.sin(angle) * player.auraRadius * 0.7 + noiseY;
                }
                
                // Steering
                const dx = tx - rat.x;
                const dy = ty - rat.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist > 5) {
                    rat.vx = (dx/dist) * ratSpeed * dt * 0.1;
                    rat.vy = (dy/dist) * ratSpeed * dt * 0.1;
                } else {
                    rat.vx *= 0.8;
                    rat.vy *= 0.8;
                }
                
                rat.x += rat.vx;
                rat.y += rat.vy;
                
                // Bounds
                rat.x = Math.max(rat.radius, Math.min(CONFIG.WIDTH - rat.radius, rat.x));
                rat.y = Math.max(rat.radius, Math.min(CONFIG.HEIGHT - rat.radius, rat.y));
            }
            
            // Remove dead rats
            rats = rats.filter(r => r.alive);
        }

        // --- ENEMY SYSTEM ---
        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let x, y;
            
            switch(side) {
                case 0: x = Math.random() * CONFIG.WIDTH; y = -20; break;
                case 1: x = CONFIG.WIDTH + 20; y = Math.random() * CONFIG.HEIGHT; break;
                case 2: x = Math.random() * CONFIG.WIDTH; y = CONFIG.HEIGHT + 20; break;
                case 3: x = -20; y = Math.random() * CONFIG.HEIGHT; break;
            }
            
            enemies.push({
                x: x,
                y: y,
                vx: 0,
                vy: 0,
                radius: 12,
                hp: 30 + waveNumber * 10,
                maxHp: 30 + waveNumber * 10,
                alive: true,
                speed: 1.5 + waveNumber * 0.1,
                damage: 10,
                attackTimer: 0
            });
        }

        function updateEnemies(dt) {
            for (const enemy of enemies) {
                if (!enemy.alive) continue;
                
                // Move to player
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist > 0) {
                    enemy.vx = (dx/dist) * enemy.speed * dt * 0.1;
                    enemy.vy = (dy/dist) * enemy.speed * dt * 0.1;
                }
                
                enemy.x += enemy.vx;
                enemy.y += enemy.vy;
                
                // Attack player
                if (dist < enemy.radius + player.radius) {
                    enemy.attackTimer += dt;
                    if (enemy.attackTimer >= 1000) {
                        player.hp -= enemy.damage;
                        enemy.attackTimer = 0;
                        
                        if (player.hp <= 0) {
                            gameOver();
                        }
                    }
                }
            }
            
            enemies = enemies.filter(e => e.alive);
        }

        // --- PARTICLES ---
        function spawnParticle(x, y, color) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 300,
                color: color
            });
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= dt;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // --- DRAW ---
        function draw() {
            // Clear
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
            
            // Grid
            ctx.strokeStyle = '#2a2a3e';
            ctx.lineWidth = 1;
            for (let x = 0; x < CONFIG.WIDTH; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CONFIG.HEIGHT);
                ctx.stroke();
            }
            for (let y = 0; y < CONFIG.HEIGHT; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(CONFIG.WIDTH, y);
                ctx.stroke();
            }
            
            // Aura
            const grad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.auraRadius);
            grad.addColorStop(0, 'rgba(147, 51, 234, 0.2)');
            grad.addColorStop(1, 'rgba(147, 51, 234, 0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.auraRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // Rats
            for (const rat of rats) {
                if (!rat.alive) continue;
                ctx.fillStyle = '#8b7355';
                ctx.beginPath();
                ctx.arc(rat.x, rat.y, rat.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Eyes
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(rat.x - 2, rat.y - 2, 1.5, 0, Math.PI * 2);
                ctx.arc(rat.x + 2, rat.y - 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Enemies
            for (const enemy of enemies) {
                if (!enemy.alive) continue;
                
                ctx.fillStyle = '#22c55e';
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Eyes
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(enemy.x - 3, enemy.y - 3, 2, 0, Math.PI * 2);
                ctx.arc(enemy.x + 3, enemy.y - 3, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // HP bar
                const hpW = 24;
                ctx.fillStyle = '#333';
                ctx.fillRect(enemy.x - hpW/2, enemy.y - enemy.radius - 8, hpW, 3);
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(enemy.x - hpW/2, enemy.y - enemy.radius - 8, hpW * (enemy.hp / enemy.maxHp), 3);
            }
            
            // Particles
            for (const p of particles) {
                ctx.globalAlpha = p.life / 300;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // Player
            ctx.fillStyle = '#a855f7';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Crown
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath();
            ctx.moveTo(player.x - 8, player.y - 10);
            ctx.lineTo(player.x - 5, player.y - 18);
            ctx.lineTo(player.x, player.y - 15);
            ctx.lineTo(player.x + 5, player.y - 18);
            ctx.lineTo(player.x + 8, player.y - 10);
            ctx.fill();
        }

        // --- UPGRADE SYSTEM ---
        const UPGRADES = [
            {
                name: '+5 Rats',
                desc: 'Add 5 rats to your swarm',
                icon: '🐀',
                apply: () => {
                    for (let i = 0; i < 5 && rats.length < CONFIG.MAX_RATS; i++) {
                        spawnRat();
                    }
                    ratCount += 5;
                }
            },
            {
                name: '+20% Damage',
                desc: 'Increase rat damage by 20%',
                icon: '⚔️',
                apply: () => { ratDamage *= 1.2; }
            },
            {
                name: '+10% Speed',
                desc: 'Increase speeds',
                icon: '💨',
                apply: () => {
                    ratSpeed *= 1.1;
                    player.speed *= 1.1;
                }
            },
            {
                name: '+50 HP',
                desc: 'Increase max HP by 50',
                icon: '❤️',
                apply: () => {
                    player.maxHp += 50;
                    player.hp += 50;
                }
            },
            {
                name: '+Aura',
                desc: 'Increase aura radius',
                icon: '✨',
                apply: () => { player.auraRadius += 20; }
            },
            {
                name: '+Attack Speed',
                desc: 'Rats attack 15% faster',
                icon: '⚡',
                apply: () => { ratAttackRate *= 0.85; }
            }
        ];

        function showUpgradeMenu() {
            gameState = 'upgrade';
            const menu = document.getElementById('upgradeMenu');
            const cards = document.getElementById('upgradeCards');
            cards.innerHTML = '';
            
            // Pick 3 random upgrades
            const available = [...UPGRADES].sort(() => 0.5 - Math.random()).slice(0, 3);
            
            available.forEach((upg, i) => {
                const card = document.createElement('div');
                card.className = 'upgrade-card';
                card.onclick = () => applyUpgrade(i);
                card.innerHTML = `
                    <div class="upgrade-icon">${upg.icon}</div>
                    <div class="upgrade-name">${upg.name}</div>
                    <div class="upgrade-desc">${upg.desc}</div>
                `;
                cards.appendChild(card);
            });
            
            menu.style.display = 'flex';
        }

        function applyUpgrade(index) {
            const cards = document.getElementById('upgradeCards');
            const upgrades = [...UPGRADES].sort(() => 0.5 - Math.random()).slice(0, 3);
            
            if (upgrades[index]) {
                upgrades[index].apply();
            }
            
            document.getElementById('upgradeMenu').style.display = 'none';
            gameState = 'playing';
        }

        // --- GAME FLOW ---
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            resetGame();
            gameState = 'playing';
        }

        function resetGame() {
            // Reset player
            player.x = CONFIG.WIDTH / 2;
            player.y = CONFIG.HEIGHT / 2;
            player.hp = 100;
            player.maxHp = 100;
            player.speed = CONFIG.PLAYER_SPEED;
            player.auraRadius = CONFIG.PLAYER_AURA;
            
            // Reset rats
            rats = [];
            ratCount = CONFIG.RAT_COUNT_INIT;
            ratDamage = CONFIG.RAT_DAMAGE;
            ratSpeed = CONFIG.RAT_SPEED;
            ratAttackRate = CONFIG.RAT_ATTACK_RATE;
            
            for (let i = 0; i < ratCount; i++) {
                spawnRat();
            }
            
            // Reset enemies
            enemies = [];
            enemySpawnInterval = CONFIG.ENEMY_SPAWN_INTERVAL;
            
            // Reset game vars
            survivalTime = 0;
            killCount = 0;
            waveNumber = 0;
            waveTimer = 0;
            enemySpawnTimer = 0;
            particles = [];
        }

        function spawnRat() {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * player.auraRadius;
            
            rats.push({
                x: player.x + Math.cos(angle) * dist,
                y: player.y + Math.sin(angle) * dist,
                vx: 0,
                vy: 0,
                radius: CONFIG.RAT_RADIUS,
                alive: true,
                id: Math.random(),
                orbitAngle: angle,
                orbitDir: Math.random() > 0.5 ? 1 : -1,
                attackCooldown: 0
            });
        }

        function gameOver() {
            gameState = 'gameover';
            const screen = document.getElementById('gameOverScreen');
            const stats = document.getElementById('finalStats');
            
            const mins = Math.floor(survivalTime / 60000);
            const secs = Math.floor((survivalTime % 60000) / 1000);
            
            stats.innerHTML = `
                Survived: ${mins}:${secs.toString().padStart(2, '0')}<br>
                Kills: ${killCount}<br>
                Wave: ${waveNumber}<br>
                Rats: ${rats.filter(r => r.alive).length}
            `;
            
            screen.style.display = 'flex';
        }

        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            resetGame();
            gameState = 'playing';
        }

        function updateUI() {
            const hpPct = (player.hp / player.maxHp) * 100;
            document.getElementById('hpFill').style.width = hpPct + '%';
            document.getElementById('hpText').textContent = `HP: ${Math.max(0, Math.floor(player.hp))}/${player.maxHp}`;
            
            const mins = Math.floor(survivalTime / 60000);
            const secs = Math.floor((survivalTime % 60000) / 1000);
            document.getElementById('timeDisplay').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            document.getElementById('killDisplay').textContent = killCount;
            document.getElementById('waveDisplay').textContent = waveNumber;
            document.getElementById('ratDisplay').textContent = rats.filter(r => r.alive).length;
            document.getElementById('damageDisplay').textContent = Math.floor(ratDamage);
        }

        // Utility
        function distance(a, b) {
            return Math.sqrt((a.x - b.x)**2 + (a.y - b.y)**2);
        }

        // Initialize
        window.onload = init;
    </script>
</body>
</html>
