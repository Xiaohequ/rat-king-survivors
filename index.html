<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rat King Survivors</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f0f1a;
            touch-action: none;
        }
        body {
            position: fixed;
            top: 0;
            left: 0;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
        }
        .screen-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 15, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 100;
            pointer-events: auto;
        }
        .screen-overlay h1 {
            font-size: 2rem;
            color: #a855f7;
            text-shadow: 0 0 20px #a855f7;
            margin-bottom: 20px;
            text-align: center;
        }
        .btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        
        /* UI HUD */
        #uiOverlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
        }
        .hud-top {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 12px;
        }
        .hp-bar {
            width: 150px;
            height: 15px;
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #a855f7;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #f59e0b);
            transition: width 0.3s;
        }

        /* Joystick Mobile */
        #joystickZone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            background: rgba(168, 85, 247, 0.2);
            border: 2px solid rgba(168, 85, 247, 0.5);
            border-radius: 50%;
            z-index: 60;
            pointer-events: auto;
        }
        #joystickKnob {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(168, 85, 247, 0.8);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        
        @media (min-width: 768px) {
            .screen-overlay h1 { font-size: 2.5rem; }
            .btn { padding: 15px 40px; font-size: 1.5rem; }
            .hud-top { font-size: 14px; }
            .hp-bar { width: 200px; height: 20px; }
            #joystickZone { width: 120px; height: 120px; }
            #joystickKnob { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="uiOverlay">
            <div class="hud-top">
                <div>
                    <div class="hp-bar"><div class="hp-fill" id="hpFill"></div></div>
                    <div id="hpText">HP: 100/100</div>
                </div>
                <div style="text-align: right;">
                    <div id="timeDisplay">0:00</div>
                    <div id="killDisplay">Kills: 0</div>
                    <div id="ratDisplay">Rats: 20</div>
                </div>
            </div>
            <div id="joystickZone"><div id="joystickKnob"></div></div>
        </div>

        <div id="startScreen" class="screen-overlay">
            <h1>🐀 Rat King Survivors</h1>
            <p style="margin-bottom: 20px; color: #aaa; text-align: center; padding: 0 20px;">Survive with your rat swarm!</p>
            <button class="btn" id="startBtn">Start Game</button>
            <p style="margin-top: 20px; color: #666; font-size: 12px;">Desktop: WASD | Mobile: Joystick</p>
        </div>

        <div id="upgradeMenu" class="screen-overlay" style="display: none;">
            <h2 style="color: #a855f7; margin-bottom: 20px;">Choose Upgrade</h2>
            <div id="upgradeCards" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding: 0 10px;"></div>
        </div>

        <div id="gameOverScreen" class="screen-overlay" style="display: none;">
            <h1 style="color: #ef4444;">Game Over</h1>
            <div id="finalStats" style="margin: 20px 0; font-size: 1.2rem; text-align: center;"></div>
            <button class="btn" id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        let CONFIG = {
            PLAYER_SPEED: 2.5,
            PLAYER_AURA: 80,
            PLAYER_HP: 100,
            RAT_COUNT_INIT: 20,
            RAT_SPEED: 2.0,
            RAT_DAMAGE: 5,
            RAT_RADIUS: 4,
            RAT_ATTACK_RATE: 500,
            ENEMY_SPEED: 1.2,
            ENEMY_HP_INIT: 30,
            ENEMY_RADIUS: 8,
            ENEMY_SPAWN_INTERVAL: 2000,
            MAX_ENEMIES: 150,
            UPGRADE_INTERVAL: 15000
        };

        // --- GAME STATE ---
        let canvas, ctx, gameState = 'start';
        let player, rats = [], enemies = [], particles = [];
        let ratCount, ratDamage, ratSpeed, ratAttackRate;
        let survivalTime = 0, killCount = 0, waveNumber = 0;
        let enemySpawnTimer = 0, upgradeTimer = 0;
        let keys = {};
        let joystick = { active: false, dx: 0, dy: 0 };
        let lastTime = 0;

        // --- INITIALIZATION ---
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            setupControls();
            setupJoystick();
            
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', restartGame);
            
            requestAnimationFrame(gameLoop);
        }

        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const w = container.clientWidth;
            const h = container.clientHeight;
            
            canvas.width = w;
            canvas.height = h;
            
            // Update config for new screen size
            const scale = Math.min(w / 800, h / 600);
            CONFIG.PLAYER_SPEED = 2.5 * scale;
            CONFIG.PLAYER_AURA = 80 * scale;
            CONFIG.RAT_RADIUS = Math.max(2, 4 * scale);
            CONFIG.ENEMY_RADIUS = Math.max(5, 8 * scale);
        }

        // --- CONTROLS ---
        function setupControls() {
            document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        }

        function setupJoystick() {
            const zone = document.getElementById('joystickZone');
            const knob = document.getElementById('joystickKnob');
            let isDragging = false;

            const handleStart = (e) => {
                isDragging = true;
                e.preventDefault();
            };
            const handleMove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const rect = zone.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                let dx = clientX - cx;
                let dy = clientY - cy;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const maxDist = rect.width / 2 - 25;
                
                if (dist > maxDist) {
                    dx = (dx / dist) * maxDist;
                    dy = (dy / dist) * maxDist;
                }
                
                knob.style.left = (50 + (dx / (rect.width/2)) * 50) + '%';
                knob.style.top = (50 + (dy / (rect.height/2)) * 50) + '%';
                
                joystick.dx = dx / maxDist;
                joystick.dy = dy / maxDist;
            };
            const handleEnd = () => {
                isDragging = false;
                joystick.dx = 0;
                joystick.dy = 0;
                knob.style.left = '50%';
                knob.style.top = '50%';
            };

            zone.addEventListener('mousedown', handleStart);
            zone.addEventListener('mousemove', handleMove);
            zone.addEventListener('mouseup', handleEnd);
            zone.addEventListener('mouseleave', handleEnd);
            
            zone.addEventListener('touchstart', handleStart, {passive: false});
            zone.addEventListener('touchmove', handleMove, {passive: false});
            zone.addEventListener('touchend', handleEnd);
        }

        // --- GAME FLOW ---
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            resetGame();
            gameState = 'playing';
        }

        function resetGame() {
            player = {
                x: canvas.width / 2,
                y: canvas.height / 2,
                hp: CONFIG.PLAYER_HP,
                maxHp: CONFIG.PLAYER_HP,
                speed: CONFIG.PLAYER_SPEED,
                auraRadius: CONFIG.PLAYER_AURA
            };
            
            rats = [];
            enemies = [];
            particles = [];
            
            ratCount = CONFIG.RAT_COUNT_INIT;
            ratDamage = CONFIG.RAT_DAMAGE;
            ratSpeed = CONFIG.RAT_SPEED;
            ratAttackRate = CONFIG.RAT_ATTACK_RATE;
            
            for (let i = 0; i < ratCount; i++) spawnRat();
            
            survivalTime = 0;
            killCount = 0;
            waveNumber = 0;
            enemySpawnTimer = 0;
            upgradeTimer = 0;
        }

        function spawnRat() {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * player.auraRadius;
            rats.push({
                x: player.x + Math.cos(angle) * dist,
                y: player.y + Math.sin(angle) * dist,
                vx: 0, vy: 0,
                radius: CONFIG.RAT_RADIUS,
                alive: true,
                attackCooldown: 0,
                orbitAngle: angle,
                orbitDir: Math.random() > 0.5 ? 1 : -1
            });
        }

        function gameOver() {
            gameState = 'gameover';
            const screen = document.getElementById('gameOverScreen');
            const stats = document.getElementById('finalStats');
            const mins = Math.floor(survivalTime / 60000);
            const secs = Math.floor((survivalTime % 60000) / 1000);
            stats.innerHTML = `Survived: ${mins}:${secs.toString().padStart(2,'0')}<br>Kills: ${killCount}<br>Wave: ${waveNumber}`;
            screen.style.display = 'flex';
        }

        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }

        // --- UPDATE LOGIC ---
        function update(dt) {
            if (gameState !== 'playing') return;
            
            survivalTime += dt;
            upgradeTimer += dt;
            
            // Player Movement
            let mx = 0, my = 0;
            if (keys['w'] || keys['arrowup']) my -= 1;
            if (keys['s'] || keys['arrowdown']) my += 1;
            if (keys['a'] || keys['arrowleft']) mx -= 1;
            if (keys['d'] || keys['arrowright']) mx += 1;
            
            if (joystick.dx !== 0 || joystick.dy !== 0) {
                mx = joystick.dx;
                my = joystick.dy;
            }
            
            if (mx !== 0 || my !== 0) {
                const len = Math.sqrt(mx*mx + my*my);
                player.x += (mx/len) * player.speed * (dt/16);
                player.y += (my/len) * player.speed * (dt/16);
            }
            
            player.x = Math.max(player.auraRadius, Math.min(canvas.width - player.auraRadius, player.x));
            player.y = Math.max(player.auraRadius, Math.min(canvas.height - player.auraRadius, player.y));
            
            enemySpawnTimer += dt;
            if (enemySpawnTimer >= CONFIG.ENEMY_SPAWN_INTERVAL && enemies.length < CONFIG.MAX_ENEMIES) {
                spawnEnemy();
                enemySpawnTimer = 0;
            }
            
            rats.forEach(rat => {
                if (!rat.alive) return;
                rat.attackCooldown -= dt;
                
                let nearest = null, nearDist = Infinity;
                enemies.forEach(e => {
                    const d = Math.sqrt((rat.x-e.x)**2 + (rat.y-e.y)**2);
                    if (d < nearDist) { nearest = e; nearDist = d; }
                });
                
                if (nearest && nearDist < 150) {
                    const angle = Math.atan2(nearest.y - rat.y, nearest.x - rat.x);
                    rat.vx = Math.cos(angle) * ratSpeed * (dt/16);
                    rat.vy = Math.sin(angle) * ratSpeed * (dt/16);
                    
                    if (nearDist < 15 && rat.attackCooldown <= 0) {
                        nearest.hp -= ratDamage;
                        rat.attackCooldown = ratAttackRate;
                        if (nearest.hp <= 0) {
                            killCount++;
                            enemies = enemies.filter(e => e !== nearest);
                        }
                    }
                } else {
                    rat.orbitAngle += (0.02 + Math.random()*0.01) * rat.orbitDir * (dt/16);
                    const targetX = player.x + Math.cos(rat.orbitAngle) * player.auraRadius * 0.8;
                    const targetY = player.y + Math.sin(rat.orbitAngle) * player.auraRadius * 0.8;
                    
                    const angle = Math.atan2(targetY - rat.y, targetX - rat.x);
                    rat.vx = Math.cos(angle) * ratSpeed * 0.8 * (dt/16);
                    rat.vy = Math.sin(angle) * ratSpeed * 0.8 * (dt/16);
                }
                
                rat.x += rat.vx;
                rat.y += rat.vy;
            });
            
            enemies.forEach(e => {
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * e.speed * (dt/16);
                e.y += Math.sin(angle) * e.speed * (dt/16);
                
                const dist = Math.sqrt((e.x-player.x)**2 + (e.y-player.y)**2);
                if (dist < player.auraRadius + e.radius) {
                    player.hp -= 0.5 * (dt/16);
                }
            });
            
            if (upgradeTimer >= CONFIG.UPGRADE_INTERVAL) {
                showUpgradeMenu();
                upgradeTimer = 0;
            }
            
            if (player.hp <= 0) gameOver();
            
            updateUI();
        }

        function spawnEnemy() {
            let x, y;
            const side = Math.floor(Math.random() * 4);
            if (side === 0) { x = 0; y = Math.random() * canvas.height; }
            else if (side === 1) { x = canvas.width; y = Math.random() * canvas.height; }
            else if (side === 2) { x = Math.random() * canvas.width; y = 0; }
            else { x = Math.random() * canvas.width; y = canvas.height; }
            
            enemies.push({
                x, y,
                hp: CONFIG.ENEMY_HP_INIT + waveNumber * 5,
                maxHp: CONFIG.ENEMY_HP_INIT + waveNumber * 5,
                speed: CONFIG.ENEMY_SPEED,
                radius: CONFIG.ENEMY_RADIUS
            });
            
            if (enemies.length % 10 === 0) waveNumber++;
        }

        // --- UPGRADE SYSTEM ---
        const UPGRADES = [
            { name: '+10 Rats', icon: '🐀', desc: 'Summon 10 more rats', apply: () => { ratCount += 10; for(let i=0; i<10; i++) spawnRat(); } },
            { name: '+Dmg', icon: '⚔️', desc: 'Rats deal 30% more damage', apply: () => { ratDamage *= 1.3; } },
            { name: '+Speed', icon: '💨', desc: 'Swarm moves 15% faster', apply: () => { ratSpeed *= 1.15; player.speed *= 1.1; } },
            { name: '+HP', icon: '❤️', desc: 'Restore and increase HP', apply: () => { player.maxHp += 30; player.hp = player.maxHp; } },
            { name: '+Aura', icon: '✨', desc: 'Increase formation radius', apply: () => { player.auraRadius += 20; } }
        ];

        function showUpgradeMenu() {
            gameState = 'upgrade';
            const menu = document.getElementById('upgradeMenu');
            const cards = document.getElementById('upgradeCards');
            cards.innerHTML = '';
            
            const choices = [...UPGRADES].sort(() => 0.5 - Math.random()).slice(0, 3);
            choices.forEach(up => {
                const card = document.createElement('div');
                card.className = 'btn';
                card.style.cssText = 'padding: 15px; cursor: pointer; text-align: center;';
                card.innerHTML = `<div style="font-size: 1.5rem;">${up.icon}</div><div style="font-weight: bold; font-size: 0.9rem;">${up.name}</div><div style="font-size: 0.7rem; color: #ccc;">${up.desc}</div>`;
                card.onclick = () => {
                    up.apply();
                    menu.style.display = 'none';
                    gameState = 'playing';
                };
                cards.appendChild(card);
            });
            menu.style.display = 'flex';
        }

        // --- RENDER ---
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.auraRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(168, 85, 247, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            rats.forEach(r => {
                if (!r.alive) return;
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#a855f7';
                ctx.fill();
            });
            
            enemies.forEach(e => {
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ef4444';
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.fillRect(e.x - 10, e.y - 15, 20, 3);
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(e.x - 10, e.y - 15, 20 * (e.hp / e.maxHp), 3);
            });
            
            ctx.beginPath();
            ctx.arc(player.x, player.y, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#f59e0b';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function updateUI() {
            const hpPct = (player.hp / player.maxHp) * 100;
            document.getElementById('hpFill').style.width = hpPct + '%';
            document.getElementById('hpText').textContent = `HP: ${Math.max(0, Math.floor(player.hp))}/${player.maxHp}`;
            
            const mins = Math.floor(survivalTime / 60000);
            const secs = Math.floor((survivalTime % 60000) / 1000);
            document.getElementById('timeDisplay').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
            document.getElementById('killDisplay').textContent = `Kills: ${killCount}`;
            document.getElementById('ratDisplay').textContent = `Rats: ${rats.filter(r => r.alive).length}`;
        }

        // --- GAME LOOP ---
        function gameLoop(timestamp) {
            const dt = timestamp - lastTime || 16;
            lastTime = timestamp;
            
            update(dt);
            render();
            
            requestAnimationFrame(gameLoop);
        }

        // --- START ---
        window.onload = init;
    </script>
</body>
</html>
